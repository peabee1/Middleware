<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e0e0d">
  <title>SQL Query Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">SQL</span>
        <span class="brand-sub">query tool</span>
      </div>
      <div class="endpoint" title="Supabase project">lkjskaygaijyelfqwoln</div>
    </header>

    <section class="input-section">
      <textarea
        id="sql-input"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="SELECT * FROM tickets WHERE status = 'OPEN' LIMIT 10"
      ></textarea>

      <div class="actions">
        <button id="format-btn" type="button" class="btn btn-secondary">Format</button>
        <button id="submit-btn" type="button" class="btn btn-primary">
          <span class="btn-label">Submit</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <div id="status" class="status" data-state="ready">Ready</div>
    </section>

    <section id="result" class="result-section" aria-live="polite"></section>

    <footer class="app-footer">
      <span class="hint">Cmd/Ctrl + Enter to submit · Tab to indent</span>
    </footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
